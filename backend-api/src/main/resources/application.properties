# Jackson: Ensures JSON fields in entities are mapped using snake_case (matches frontend)
spring.jackson.property-naming-strategy=SNAKE_CASE

# JWT: Security configuration
jwt.secret=MealPlannerSuperSecretKeyMustBeAtLeast256BitsLongForHS256Algorithm!!
jwt.expiration-ms=86400000

# CORS: Allow requests from the React frontend
